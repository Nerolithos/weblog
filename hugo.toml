baseURL = 'https://blog.nero-lithos.com/'
defaultContentLanguage = "zh-cn"
defaultContentLanguageInSubdir = false
languageCode = 'zh-cn'
title = "Lithos' Blog" # Blog title
theme = 'ananke1'
hasCJKLanguage = true
canonifyurls = true
pagination.pagerSize = 6

[outputs]
  home = ["HTML", "RSS", "JSON"]

googleAnalytics = ""
enableRobotsTXT = true

[params]
  custom_css = ["css/custom.css"]
  text_color = ""
  author = ""
  favicon = "/favicon.ico"
  site_logo = ""
  background_color_class = "bg-black"
  recent_posts_number = 100
  # 仍然保留页脚链接
  footer_links = [
    { name = "💻 GitHub", url = "https://github.com/Nerolithos" },
    { name = "🎨 Pixiv", url = "/pixiv/" },
    { name = "📊 EnergyVis", url = "https://blog.nero-lithos.com/DDA/" },
    { name = "⚗️ ChemVis", url = "https://blog.nero-lithos.com/chem/" },
    { name = "🤖 LGU CourseAI", url = "https://blog.nero-lithos.com/courseai/" },
    { name = "🐈 ArkPet", url = "https://blog.nero-lithos.com/pet" }
  ]

# 顶部导航菜单（Ananke 会在 header 渲染 .Site.Menus.main）
[menu]
  [[menu.main]]
    name = "💻 GitHub"
    url  = "https://github.com/Nerolithos"
    weight = 1
  [[menu.main]]
    name = "🎨 Pixiv"
    url  = "/pixiv/"
    weight = 2
  [[menu.main]]
    name = "📊 EnergyVis"
    url  = "https://blog.nero-lithos.com/DDA/"
    weight = 3
  [[menu.main]]
    name = "⚗️ ChemVis"
    url  = "https://blog.nero-lithos.com/chem/"
    weight = 4
  [[menu.main]]
    name = "🤖 LGU CourseAI"
    url  = "https://blog.nero-lithos.com/courseai/"
    weight = 5
  [[menu.main]]
    name = "🐈 ArkPet"
    url  = "https://blog.nero-lithos.com/pet"
    weight = 6

[services]
  [services.disqus]
    shortname = 'nero-lithos'

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
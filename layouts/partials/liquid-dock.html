    <span class="liquid-dock-main-dot"></span>
  </button>
  <div class="liquid-dock-menu">
    <a href="https://lguide.net" class="liquid-dock-item" data-dock-item target="_blank" rel="noopener noreferrer" aria-label="龙大课程助手" data-tooltip="龙大课程助手" title="龙大课程助手">

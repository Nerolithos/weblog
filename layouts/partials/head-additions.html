<link rel="stylesheet" href="{{ "/css/custom.css" | relURL }}">

<style>
	/* 阅读进度条样式：独立于主题 CSS，避免缓存问题 */
	#reading-progress {
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 6px;
		background: rgba(0, 160, 200, 0.08);
		z-index: 9999;
		pointer-events: none;
	}

	#reading-progress-bar {
		width: 100%;
		height: 100%;
		background: #00a0c8;
		box-shadow: 0 0 6px rgba(0, 160, 200, 0.8);
		transform-origin: left center;
		transform: scaleX(0);
		transition: transform 0.08s linear;
	}

	/* 首页文章卡片悬浮特效：保证本地/线上都可见 */
	.home-post-card {
		position: relative;
		background: rgba(255, 255, 255, 0.96);
		border-radius: 8px;
		padding: 0.75rem 1.5rem; /* 增加左右留白，让文字不贴边 */
		cursor: pointer;
		transition: transform 0.15s ease-out,
								box-shadow 0.15s ease-out,
								background 0.15s ease-out;
	}

	.home-post-card:hover {
		transform: translateY(-4px) scale(1.01);
		box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
		background: #ffffff;
		z-index: 2;
	}

	.home-post-preview {
		max-height: 4.5em; /* 默认约 3 行 */
		overflow: hidden;
		position: relative;
		transition: max-height 0.2s ease-out;
	}

	.home-post-card:hover .home-post-preview {
		max-height: 12em; /* 悬浮时展开更多文字作为预览 */
	}
</style>

{{/* 阅读进度条逻辑：在有对应 DOM 时才生效，避免干扰其它页面 */}}
<script>
	document.addEventListener('DOMContentLoaded', function () {
		var container = document.getElementById('reading-progress');
		var bar = document.getElementById('reading-progress-bar');
		if (!container || !bar) {
			return;
		}

		var ticking = false;

		function updateProgress() {
			var scrollTop = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
			var docHeight = document.documentElement.scrollHeight - window.innerHeight;
			var ratio = 0;
			if (docHeight > 0) {
				ratio = scrollTop / docHeight;
			}
			if (ratio < 0) ratio = 0;
			if (ratio > 1) ratio = 1;

			bar.style.transform = 'scaleX(' + ratio.toFixed(4) + ')';
			ticking = false;
		}

		function requestTick() {
			if (!ticking) {
				window.requestAnimationFrame(updateProgress);
				ticking = true;
			}
		}

		window.addEventListener('scroll', requestTick, { passive: true });
		window.addEventListener('resize', requestTick);

		// 初始计算一次
		updateProgress();
	});
</script>

{{/* 首页卡片点击整块跳转到对应文章 */}}
<script>
	document.addEventListener('DOMContentLoaded', function () {
		var cards = document.querySelectorAll('.home-post-card[data-post-url]');
		if (!cards || !cards.length) {
			return;
		}

		cards.forEach(function (card) {
			var url = card.getAttribute('data-post-url');
			if (!url) return;

			card.addEventListener('click', function (event) {
				// 如果点击的是内部已有的 <a>，沿用原生行为
				if (event.target && event.target.closest('a')) {
					return;
				}
				window.location.href = url;
			});
		});
	});
</script>

{{/* 文章页目录 scrollspy：高亮当前章节 */}}
<script>
	document.addEventListener('DOMContentLoaded', function () {
		var toc = document.querySelector('.post-toc');
		if (!toc) return;

		var links = Array.prototype.slice.call(toc.querySelectorAll('a[href^="#"]'));
		if (!links.length) return;

		var sections = [];
		links.forEach(function (link) {
			var href = link.getAttribute('href');
			if (!href || href.charAt(0) !== '#') return;
			var id = decodeURIComponent(href.slice(1));
			var el = document.getElementById(id);
			if (el) {
				sections.push({ link: link, el: el });
			}
		});

		if (!sections.length) return;

		function onScroll() {
			var scrollY = window.pageYOffset || document.documentElement.scrollTop || 0;
			var offset = 120; // 提前一点高亮当前小节
			var current = null;

			for (var i = 0; i < sections.length; i++) {
				var rect = sections[i].el.getBoundingClientRect();
				var top = rect.top + scrollY;
				if (top - offset <= scrollY) {
					current = sections[i];
				} else {
					break;
				}
			}

			links.forEach(function (lnk) {
				lnk.classList.remove('post-toc-active');
			});
			if (current) {
				current.link.classList.add('post-toc-active');
			}
		}

		window.addEventListener('scroll', onScroll, { passive: true });
		window.addEventListener('resize', onScroll);
		// 初次计算
		onScroll();

		// 目录最小化/展开逻辑
		var miniBtn = document.querySelector('.post-toc-mini');
		var toggleBtn = toc.querySelector('.post-toc-toggle');
		if (miniBtn && toggleBtn) {
			function hideToc() {
				toc.style.display = 'none';
				miniBtn.style.display = 'inline-flex';
			}

			function showToc() {
				toc.style.display = 'block';
				miniBtn.style.display = 'none';
			}

			toggleBtn.addEventListener('click', hideToc);
			miniBtn.addEventListener('click', showToc);
		}
	});
</script>

{{/* 左下角 Liquid Glass 任务坞：站内搜索 + 深浅模式切换 */}}
<script>
	document.addEventListener('DOMContentLoaded', function () {
		var body = document.body;
		var storageKey = 'site-theme-mode';

		function applyTheme(mode) {
			if (mode === 'dark') {
				body.classList.add('dark-mode');
			} else {
				body.classList.remove('dark-mode');
			}
			try {
				localStorage.setItem(storageKey, mode);
			} catch (e) {}
		}

		function initTheme() {
			var saved = null;
			try {
				saved = localStorage.getItem(storageKey);
			} catch (e) {}
			if (saved === 'dark' || saved === 'light') {
				applyTheme(saved);
			} else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
				applyTheme('dark');
			}
		}

		function toggleTheme() {
			var isDark = body.classList.contains('dark-mode');
			applyTheme(isDark ? 'light' : 'dark');
		}

		// 初始化主题：无论当前页面是否有任务坞都执行
		initTheme();

		// 监听其它标签页对主题的修改，实现多页面同步
		window.addEventListener('storage', function (event) {
			if (event.key !== storageKey) return;
			var mode = event.newValue === 'dark' ? 'dark' : 'light';
			applyTheme(mode);
		});

		// 若页面没有任务坞，仅保留主题记忆功能
		var dock = document.querySelector('[data-liquid-dock]');
		if (!dock) return;

		var mainBtn = dock.querySelector('[data-dock-main]');
		var items = dock.querySelectorAll('[data-dock-item]');
		if (!mainBtn || !items.length) return;

		function openDock() {
			dock.classList.add('dock-open');
		}

		function closeDock() {
			dock.classList.remove('dock-open');
		}

		function toggleDockOpen() {
			dock.classList.toggle('dock-open');
		}

		mainBtn.addEventListener('click', function (event) {
			event.stopPropagation();
			toggleDockOpen();
		});

		document.addEventListener('click', function (event) {
			if (!dock.contains(event.target)) {
				closeDock();
			}
		});

		items.forEach(function (btn) {
			btn.addEventListener('click', function (event) {
				event.stopPropagation();
				var action = btn.getAttribute('data-action');
				if (action === 'search') {
					var url = dock.getAttribute('data-search-url') || '/search/';
					window.location.href = url;
				} else if (action === 'theme') {
					toggleTheme();
				} else if (action === 'lang') {
					// 预留：中英切换暂未实现
				}
				closeDock();
			});
		});
	});
</script>

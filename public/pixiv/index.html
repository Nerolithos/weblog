<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pixiv Redirect Notice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      max-width: 520px;
      width: 90%;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 16px;
      padding: 1.5rem 1.75rem 1.75rem;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.4);
    }
    h1 {
      margin: 0 0 0.6rem;
      font-size: 1.4rem;
    }
    p {
      margin: 0.35rem 0;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .main-text {
      margin-top: 0.75rem;
      margin-bottom: 1.1rem;
      font-size: 0.96rem;
    }
    .buttons {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.25rem;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 0.55rem 1.3rem;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }
    .primary {
      background: #3ef11e;
      color: #091020;
    }
    .secondary {
      background: transparent;
      color: #ffffff;
      border: 1px solid rgba(148, 163, 184, 0.6);
    }
    small {
      display: block;
      margin-top: 0.9rem;
      font-size: 0.78rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Pixiv Link Safety Notice</h1>
    <p class="main-text">
      If you HAVE a logged-in pixiv account, we do NOT advice you to open this link in public, pixiv is prone to show NSFW content. If NOT, its safe to proceed.
    </p>
    <div class="buttons">
      <button class="primary" id="proceed-btn">Proceed</button>
      <button class="secondary" id="return-btn">Return</button>
    </div>
    <small>This page is only a safety reminder before leaving blog.nero-lithos.com.</small>
  </div>

  <script>
    const target = 'https://www.pixiv.net/users/107379421';

    document.getElementById('proceed-btn').addEventListener('click', () => {
      window.location.href = target;
    });

    document.getElementById('return-btn').addEventListener('click', () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '/';
      }
    });
  </script>
</body>
</html>

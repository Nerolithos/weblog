<style>
	 
	#reading-progress {
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 6px;
		background: rgba(0, 160, 200, 0.08);
		z-index: 9999;
		pointer-events: none;
	}

	#reading-progress-bar {
		width: 100%;
		height: 100%;
		background: #00a0c8;
		box-shadow: 0 0 6px rgba(0, 160, 200, 0.8);
		transform-origin: left center;
		transform: scaleX(0);
		transition: transform 0.08s linear;
	}

	 
	.home-post-card {
		position: relative;
		background: rgba(255, 255, 255, 0.96);
		border-radius: 8px;
		padding: 0.75rem 1.5rem;  
		cursor: pointer;
		transition: transform 0.15s ease-out,
								box-shadow 0.15s ease-out,
								background 0.15s ease-out;
	}

	.home-post-card:hover {
		transform: translateY(-4px) scale(1.01);
		box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
		background: #ffffff;
		z-index: 2;
	}

	.home-post-preview {
		max-height: 4.5em;  
		overflow: hidden;
		position: relative;
		transition: max-height 0.2s ease-out;
	}

	.home-post-card:hover .home-post-preview {
		max-height: 12em;  
	}
</style>


<script>
	document.addEventListener('DOMContentLoaded', function () {
		var container = document.getElementById('reading-progress');
		var bar = document.getElementById('reading-progress-bar');
		if (!container || !bar) {
			return;
		}

		var ticking = false;

		function updateProgress() {
			var scrollTop = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
			var docHeight = document.documentElement.scrollHeight - window.innerHeight;
			var ratio = 0;
			if (docHeight > 0) {
				ratio = scrollTop / docHeight;
			}
			if (ratio < 0) ratio = 0;
			if (ratio > 1) ratio = 1;

			bar.style.transform = 'scaleX(' + ratio.toFixed(4) + ')';
			ticking = false;
		}

		function requestTick() {
			if (!ticking) {
				window.requestAnimationFrame(updateProgress);
				ticking = true;
			}
		}

		window.addEventListener('scroll', requestTick, { passive: true });
		window.addEventListener('resize', requestTick);

		
		updateProgress();
	});
</script>


<script>
	document.addEventListener('DOMContentLoaded', function () {
		var cards = document.querySelectorAll('.home-post-card[data-post-url]');
		if (!cards || !cards.length) {
			return;
		}

		cards.forEach(function (card) {
			var url = card.getAttribute('data-post-url');
			if (!url) return;

			card.addEventListener('click', function (event) {
				
				if (event.target && event.target.closest('a')) {
					return;
				}
				window.location.href = url;
			});
		});
	});
</script>

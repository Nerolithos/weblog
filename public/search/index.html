<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>站内搜索 - Lithos' Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/custom.css" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; }
    .search-container { max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    .search-box { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    .search-input { flex: 1; padding: .5rem .75rem; font-size: 1rem; border-radius: 4px; border: 1px solid #ccc; }
    .search-button { padding: .5rem 1rem; font-size: 1rem; border-radius: 4px; border: none; background: #111; color: #fff; cursor: pointer; }
    .search-button:disabled { opacity: .6; cursor: default; }
    .result-item { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
    .result-title { font-size: 1.1rem; margin-bottom: .25rem; }
    .result-snippet { color: #555; white-space: pre-line; }
    .result-meta { font-size: .8rem; color: #888; margin-bottom: .25rem; }
    .status { font-size: .9rem; color: #666; margin-bottom: .75rem; }
    mark { background: #ffe58f; }

    /* 搜索页暗色模式细节调整，继承全站 dark-mode 方案 */
    body.dark-mode {
      background-color: #020617;
      color: #e5e7eb;
    }

    body.dark-mode .search-input {
      background-color: #020617;
      color: #e5e7eb;
      border-color: rgba(148,163,184,0.7);
    }

    body.dark-mode .search-input::placeholder {
      color: #6b7280;
    }

    body.dark-mode .search-button {
      background: #111827;
      color: #f9fafb;
    }

    body.dark-mode .result-item {
      border-color: rgba(55,65,81,0.8);
    }

    body.dark-mode .result-snippet {
      color: #9ca3af;
    }

    body.dark-mode .status {
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="search-container">
    <h1>站内搜索</h1>
    <p class="status" id="status">正在加载索引…</p>
    <form class="search-box" id="search-form">
      <input id="search-input" class="search-input" type="search" name="q" placeholder="输入关键字，按回车搜索" />
      <button id="search-button" class="search-button" type="submit">搜索</button>
    </form>
    <div id="results"></div>
  </div>

  <script>
  // 根据全站的 localStorage 主题设置同步搜索页的亮/暗模式
  (function() {
    var storageKey = 'site-theme-mode';
    function applyThemeFromStorage() {
      try {
        var saved = localStorage.getItem(storageKey);
        if (saved === 'dark' || saved === 'light') {
          if (saved === 'dark') {
            document.body.classList.add('dark-mode');
          } else {
            document.body.classList.remove('dark-mode');
          }
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.body.classList.add('dark-mode');
        } else {
          document.body.classList.remove('dark-mode');
        }
      } catch (e) {}
    }

    applyThemeFromStorage();

    window.addEventListener('storage', function (event) {
      if (event.key !== storageKey) return;
      applyThemeFromStorage();
    });
  })();

  (function() {
    const input = document.getElementById('search-input');
    const form = document.getElementById('search-form');
    const resultsEl = document.getElementById('results');
    const statusEl = document.getElementById('status');
    const button = document.getElementById('search-button');

    const TITLE_WEIGHT = 3.0;
    const SUMMARY_WEIGHT = 1.6;
    const CONTENT_WEIGHT = 1.0;
    const BM25_K1 = 1.2;
    const BM25_B = 0.75;

    let rawIndexData = [];
    let searchableDocs = [];
    let termDocFreq = new Map();
    let avgDocLen = 0;

    function getQueryFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('q') || '';
    }

    function updateURL(q) {
      const url = new URL(window.location.href);
      if (q) {
        url.searchParams.set('q', q);
      } else {
        url.searchParams.delete('q');
      }
      window.history.replaceState({}, '', url);
    }

    function highlight(text, q, tokens) {
      if (!text) return '';
      const terms = [];
      if (q && q.trim()) terms.push(q.trim());
      if (Array.isArray(tokens)) {
        for (const t of tokens) {
          if (t && t.length >= 2) terms.push(t);
        }
      }
      if (!terms.length) return text;

      try {
        const unique = Array.from(new Set(terms));
        unique.sort((a, b) => b.length - a.length);
        const escaped = unique.map(function(term) {
          return term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        });
        const re = new RegExp('(' + escaped.join('|') + ')', 'ig');
        return text.replace(re, m => '<mark>' + m + '</mark>');
      } catch (e) {
        return text;
      }
    }

    function extractLatinTokens(text) {
      const tokens = [];
      const re = /[a-z0-9_]+/g;
      let m;
      while ((m = re.exec(text)) !== null) {
        if (m[0]) tokens.push(m[0]);
      }
      return tokens;
    }

    function extractCjkTokens(text) {
      const tokens = [];
      const runs = text.match(/[\u3400-\u9fff]+/g) || [];
      for (const run of runs) {
        const chars = Array.from(run);
        for (let i = 0; i < chars.length; i++) {
          tokens.push(chars[i]);
          if (i + 1 < chars.length) {
            tokens.push(chars[i] + chars[i + 1]);
          }
        }
      }
      return tokens;
    }

    function tokenize(text) {
      const normalized = (text || '').toLowerCase();
      if (!normalized) return [];
      return extractLatinTokens(normalized).concat(extractCjkTokens(normalized));
    }

    function countTerms(tokens) {
      const tf = new Map();
      for (const t of tokens) {
        tf.set(t, (tf.get(t) || 0) + 1);
      }
      return tf;
    }

    function mergeWeightedTf(target, source, weight) {
      for (const [term, freq] of source.entries()) {
        target.set(term, (target.get(term) || 0) + freq * weight);
      }
    }

    function buildSearchableIndex(data) {
      searchableDocs = [];
      termDocFreq = new Map();
      avgDocLen = 0;

      for (const item of data) {
        const title = item.title || '';
        const summary = item.summary || '';
        const content = item.content || '';

        const titleTf = countTerms(tokenize(title));
        const summaryTf = countTerms(tokenize(summary));
        const contentTf = countTerms(tokenize(content));
        const tf = new Map();

        mergeWeightedTf(tf, titleTf, TITLE_WEIGHT);
        mergeWeightedTf(tf, summaryTf, SUMMARY_WEIGHT);
        mergeWeightedTf(tf, contentTf, CONTENT_WEIGHT);

        let docLen = 0;
        for (const freq of tf.values()) {
          docLen += freq;
        }

        const doc = {
          title: title,
          summary: summary,
          content: content,
          permalink: item.permalink,
          date: item.date,
          tags: item.tags || [],
          tf: tf,
          dl: docLen,
          searchText: (title + ' ' + summary + ' ' + content).toLowerCase(),
          titleLower: title.toLowerCase(),
          summaryLower: summary.toLowerCase(),
          contentLower: content.toLowerCase()
        };

        searchableDocs.push(doc);

        for (const term of tf.keys()) {
          termDocFreq.set(term, (termDocFreq.get(term) || 0) + 1);
        }
      }

      const totalLen = searchableDocs.reduce((sum, doc) => sum + doc.dl, 0);
      avgDocLen = searchableDocs.length ? totalLen / searchableDocs.length : 0;
    }

    function bm25Idf(term, docCount) {
      const df = termDocFreq.get(term) || 0;
      if (!df || !docCount) return 0;
      return Math.log(1 + (docCount - df + 0.5) / (df + 0.5));
    }

    function bm25ScoreDoc(doc, queryTerms, docCount) {
      if (!queryTerms.length) return 0;
      let score = 0;
      const denomNorm = 1 - BM25_B + BM25_B * (avgDocLen > 0 ? (doc.dl / avgDocLen) : 1);

      for (const term of queryTerms) {
        const tf = doc.tf.get(term) || 0;
        if (!tf) continue;
        const idf = bm25Idf(term, docCount);
        const num = tf * (BM25_K1 + 1);
        const den = tf + BM25_K1 * denomNorm;
        score += idf * (num / den);
      }

      return score;
    }

    function findSnippet(source, query, queryTerms) {
      const text = source || '';
      if (!text) return '';

      const sourceLower = text.toLowerCase();
      let pos = sourceLower.indexOf(query.toLowerCase());

      if (pos === -1) {
        for (const term of queryTerms) {
          pos = sourceLower.indexOf(term);
          if (pos !== -1) break;
        }
      }

      if (pos === -1) {
        return text.slice(0, 180);
      }

      const start = Math.max(0, pos - 70);
      const end = Math.min(text.length, pos + query.length + 90);
      return (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
    }

    function appendHighlightParam(permalink, query) {
      try {
        const url = new URL(permalink, window.location.origin);
        url.searchParams.set('hl', query);
        return url.toString();
      } catch (e) {
        return permalink;
      }
    }

    function search(q) {
      const query = q.trim();
      updateURL(query);

      if (!query) {
        statusEl.textContent = '请输入关键字开始搜索。';
        resultsEl.innerHTML = '';
        return;
      }

      const qLower = query.toLowerCase();
      const queryTerms = tokenize(query);
      const queryTermsUnique = Array.from(new Set(queryTerms));
      const results = [];

      for (const doc of searchableDocs) {
        const baseScore = bm25ScoreDoc(doc, queryTermsUnique, searchableDocs.length);
        const hasSubstring = doc.searchText.includes(qLower);

        if (baseScore <= 0 && !hasSubstring) continue;

        let score = baseScore;
        if (doc.titleLower.includes(qLower)) score += 6;
        if (doc.summaryLower.includes(qLower)) score += 2;
        if (doc.contentLower.includes(qLower)) score += 1;

        let source = doc.content || doc.summary || '';
        const snippet = findSnippet(source, query, queryTermsUnique);

        results.push({
          score: score,
          title: doc.title,
          permalink: doc.permalink,
          date: doc.date,
          tags: doc.tags || [],
          snippet: snippet,
          queryTerms: queryTermsUnique
        });
      }

      results.sort((a, b) => b.score - a.score);

      if (!results.length) {
        statusEl.textContent = '未找到相关结果。试试中英翻译或使用近似词？';
        resultsEl.innerHTML = '';
        return;
      }

      statusEl.textContent = `共找到 ${results.length} 条结果。`;
      resultsEl.innerHTML = results.map(r => {
        const tags = (r.tags || []).join(', ');
        const jumpUrl = appendHighlightParam(r.permalink, query);
        return `
          <div class="result-item">
            <div class="result-title"><a href="${jumpUrl}">${highlight(r.title, query, r.queryTerms)}</a></div>
            <div class="result-meta">${r.date || ''}${tags ? ' · ' + tags : ''}</div>
            <div class="result-snippet">${highlight(r.snippet, query, r.queryTerms)}</div>
          </div>
        `;
      }).join('');
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      search(input.value);
    });

    // 加载索引
    fetch('/index.json', { credentials: 'omit' })
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(data => {
        if (!Array.isArray(data)) throw new Error('Unexpected index format');
        rawIndexData = data;
        buildSearchableIndex(rawIndexData);
        statusEl.textContent = `索引已加载，共 ${rawIndexData.length} 篇文章（BM25 排序）。`;
        const initial = getQueryFromURL();
        if (initial) {
          input.value = initial;
          search(initial);
        }
      })
      .catch(err => {
        console.error('加载索引失败', err);
        statusEl.textContent = '加载索引失败，请稍后重试。';
        button.disabled = true;
      });
  })();
  </script>
</body>
</html>

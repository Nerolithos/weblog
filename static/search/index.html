<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>站内搜索 - Lithos' Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/custom.css" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; }
    .search-container { max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    .search-box { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    .search-input { flex: 1; padding: .5rem .75rem; font-size: 1rem; border-radius: 4px; border: 1px solid #ccc; }
    .search-button { padding: .5rem 1rem; font-size: 1rem; border-radius: 4px; border: none; background: #111; color: #fff; cursor: pointer; }
    .search-button:disabled { opacity: .6; cursor: default; }
    .result-item { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
    .result-title { font-size: 1.1rem; margin-bottom: .25rem; }
    .result-snippet { color: #555; white-space: pre-line; }
    .result-meta { font-size: .8rem; color: #888; margin-bottom: .25rem; }
    .status { font-size: .9rem; color: #666; margin-bottom: .75rem; }
    mark { background: #ffe58f; }
  </style>
</head>
<body>
  <div class="search-container">
    <h1>站内搜索</h1>
    <p class="status" id="status">正在加载索引…</p>
    <form class="search-box" id="search-form">
      <input id="search-input" class="search-input" type="search" name="q" placeholder="输入关键字，按回车搜索" />
      <button id="search-button" class="search-button" type="submit">搜索</button>
    </form>
    <div id="results"></div>
  </div>

  <script>
  (function() {
    const input = document.getElementById('search-input');
    const form = document.getElementById('search-form');
    const resultsEl = document.getElementById('results');
    const statusEl = document.getElementById('status');
    const button = document.getElementById('search-button');

    let indexData = [];

    function getQueryFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('q') || '';
    }

    function updateURL(q) {
      const url = new URL(window.location.href);
      if (q) {
        url.searchParams.set('q', q);
      } else {
        url.searchParams.delete('q');
      }
      window.history.replaceState({}, '', url);
    }

    function highlight(text, q) {
      if (!q) return text;
      try {
        const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const re = new RegExp(escaped, 'ig');
        return text.replace(re, m => '<mark>' + m + '</mark>');
      } catch (e) {
        return text;
      }
    }

    function search(q) {
      const query = q.trim();
      updateURL(query);

      if (!query) {
        statusEl.textContent = '请输入关键字开始搜索。';
        resultsEl.innerHTML = '';
        return;
      }

      const qLower = query.toLowerCase();
      const results = [];

      for (const item of indexData) {
        const haystack = (item.title + ' ' + (item.content || '') + ' ' + (item.summary || '')).toLowerCase();
        if (!haystack.includes(qLower)) continue;

        let source = item.content || item.summary || '';
        const pos = source.toLowerCase().indexOf(qLower);
        let snippet;
        if (pos === -1) {
          snippet = source.slice(0, 160);
        } else {
          const start = Math.max(0, pos - 60);
          const end = Math.min(source.length, pos + query.length + 60);
          snippet = (start > 0 ? '…' : '') + source.slice(start, end) + (end < source.length ? '…' : '');
        }

        results.push({
          title: item.title,
          permalink: item.permalink,
          date: item.date,
          tags: item.tags || [],
          snippet: snippet
        });
      }

      if (!results.length) {
        statusEl.textContent = '未找到相关结果。试试中英翻译或使用近似词？';
        resultsEl.innerHTML = '';
        return;
      }

      statusEl.textContent = `共找到 ${results.length} 条结果。`;
      resultsEl.innerHTML = results.map(r => {
        const tags = (r.tags || []).join(', ');
        return `
          <div class="result-item">
            <div class="result-title"><a href="${r.permalink}">${highlight(r.title, query)}</a></div>
            <div class="result-meta">${r.date || ''}${tags ? ' · ' + tags : ''}</div>
            <div class="result-snippet">${highlight(r.snippet, query)}</div>
          </div>
        `;
      }).join('');
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      search(input.value);
    });

    // 加载索引
    fetch('/index.json', { credentials: 'omit' })
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(data => {
        if (!Array.isArray(data)) throw new Error('Unexpected index format');
        indexData = data;
        statusEl.textContent = `索引已加载，共 ${indexData.length} 篇文章。`;
        const initial = getQueryFromURL();
        if (initial) {
          input.value = initial;
          search(initial);
        }
      })
      .catch(err => {
        console.error('加载索引失败', err);
        statusEl.textContent = '加载索引失败，请稍后重试。';
        button.disabled = true;
      });
  })();
  </script>
</body>
</html>
